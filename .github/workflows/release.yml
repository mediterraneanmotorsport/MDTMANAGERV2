name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Build Electron installer
        run: npx electron-builder --win

      - name: Create GitHub Release and upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = (Get-ChildItem -Path dist-electron -Filter "*.exe" | Select-Object -First 1).FullName
          gh release create $env:GITHUB_REF_NAME "$exe" "dist-electron/latest.yml" --title $env:GITHUB_REF_NAME --notes ""
